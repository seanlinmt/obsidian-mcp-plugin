name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [20.x]
    
    steps:
    - uses: actions/checkout@v7
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build
      run: npm run build
    
    # Runs the suite and enforces the coverage floors in jest.config.js.
    # Fails the build on backslide; raise a floor when real coverage clears it.
    - name: Run tests + coverage gate
      run: npm run test:coverage

    - name: Coverage map
      if: always()
      run: node scripts/coverage-map.mjs

    - name: Run linter
      run: npm run lint
      continue-on-error: true  # Don't fail on lint warnings for now